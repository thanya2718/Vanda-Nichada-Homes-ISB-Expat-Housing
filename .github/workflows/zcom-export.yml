name: Build ZIP for Z.com Hosting

on:
  workflow_dispatch:

jobs:
  build-zcom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build for Z.com
        run: npm run build
        env:
          DEPLOY_TARGET: zcom

      - name: Zip exported site
        run: |
          cd out
          zip -r ../vanda-zcom-website.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanda-zcom-website
          path: vanda-zcom-website.zip
